# ===============================
# Configuration for test environment to enable SSL (https)
# ===============================
server.port=443
server.ssl.key-store=C:/SWDTOOLS/ssl/mysslkeystore.p12
server.ssl.key-store-password=anup123
server.ssl.keyStoreType=PKCS12
server.ssl.keyAlias=mysslcert

# ===============================
# MySQL Database connection details for test environment databases
# ===============================

spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/login
spring.datasource.username=anup
spring.datasource.password=root

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect