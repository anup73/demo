# ===============================
# Dev environment is configured for non-encrypted communication (http)
# ===============================

server.port=8080
# ===============================
# MySQL Database connection details for Dev environment database
# ===============================

spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/login_dev
spring.datasource.username=anup
spring.datasource.password=root

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect